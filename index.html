<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedAlert OS | בדיקת נתוני אמת</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3b30; --green: #34c759; --bg: #000; --card: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; }
        .page { padding: 20px; }
        .orb { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--green); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 22px; transition: 0.3s; }
        .orb.alert { border-color: var(--red); box-shadow: 0 0 20px var(--red); color: var(--red); }
        .history-feed { background: var(--card); border-radius: 15px; padding: 15px; max-height: 350px; overflow-y: auto; border: 1px solid #333; }
        .feed-item { padding: 12px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 15px; }
        .status-badge { text-align: center; padding: 5px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="page">
        <h2 style="font-family:'Orbitron'; color:var(--red); text-align:center;">REDALERT OS | LIVE</h2>
        <div id="statusOrb" class="orb">בדיקה...</div>
        <div id="connectionStatus" class="status-badge">מנסה להתחבר לשרת...</div>

        <h3 style="margin-top:30px;">היסטוריית אזעקות בזמן אמת:</h3>
        <div id="globalFeed" class="history-feed">טוען נתונים מהמקור...</div>
        
        <p style="text-align:center; opacity:0.3; font-size:11px; margin-top:50px;">מפתח: דניאל כרייף | breslev6135@gmail.com</p>
    </div>

<script>
    async function checkRealTimeData() {
        const feed = document.getElementById('globalFeed');
        const orb = document.getElementById('statusOrb');
        const status = document.getElementById('connectionStatus');

        try {
            // שימוש ב-Proxy שעובד מעולה ברשת פתוחה
            const url = 'https://corsproxy.io/?' + encodeURIComponent('https://www.oref.org.il/WarningMessages/History/AlertsHistory.json');
            const response = await fetch(url + '&t=' + Date.now());
            
            if (!response.ok) throw new Error('Network error');
            
            const data = await response.json();
            
            if (data && data.length > 0) {
                status.innerText = "מחובר לנתוני אמת - עודכן ב: " + new Date().toLocaleTimeString();
                status.style.color = "var(--green)";
                orb.innerText = "מחובר";
                orb.classList.remove('alert');

                feed.innerHTML = data.slice(0, 20).map(a => `
                    <div class="feed-item">
                        <span>${a.alertDate.split(' ')[1]}</span>
                        <b>${a.data}</b>
                    </div>
                `).join('');
            } else {
                feed.innerHTML = "אין התראות ב-24 השעות האחרונות.";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "שגיאת חיבור. וודא שאתה ברשת פתוחה.";
            status.style.color = "var(--red)";
            orb.innerText = "שגיאה";
        }
    }

    // רענון מהיר כל 5 שניות לבדיקה
    setInterval(checkRealTimeData, 5000);
    checkRealTimeData();
</script>
</body>
</html>
