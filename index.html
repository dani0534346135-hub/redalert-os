<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedAlert OS | Real-Time Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3b30; --orange: #ff9500; --green: #34c759; --bg: #000; --card: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; }
        .page { display: none; padding: 20px; min-height: 100vh; }
        .page.active { display: block; }
        
        /* עיצוב הריבועים שאהבת */
        .guidelines-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .guide-box { background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .guide-box b { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 5px; }
        .guide-box span { font-size: 13px; font-weight: bold; color: var(--green); }

        .orb { width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--green); margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .orb.alert { border-color: var(--red); box-shadow: 0 0 30px var(--red); }
        
        .history-feed { background: var(--card); border-radius: 15px; padding: 15px; max-height: 300px; overflow-y: auto; border: 1px solid #333; }
        .feed-item { padding: 10px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 14px; }
        
        .search-bar { display: flex; background: var(--card); border-radius: 12px; padding: 5px 15px; margin: 20px 0; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .add-btn { color: var(--green); font-size: 28px; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mainPage" class="page active">
        <h2 style="font-family:'Orbitron'; color:var(--red); text-align:center;">REDALERT OS LIVE</h2>
        
        <div class="orb" id="statusOrb">
            <h3 id="statusText">שגרה</h3>
            <div id="timerDisplay" style="display:none; font-family:'Orbitron'; font-size:40px;">15</div>
        </div>

        <div class="search-bar">
            <input type="text" id="cityInput" placeholder="הוסף עיר למעקב...">
            <button class="add-btn" onclick="addCity()">+</button>
        </div>

        <div id="myCitiesList"></div>

        <h3 style="opacity:0.7;">היסטוריית אמת (10 דקות אחרונות):</h3>
        <div id="globalFeed" class="history-feed">מתחבר לשרת פיקוד העורף...</div>
        
        <p style="text-align:center; opacity:0.3; font-size:12px; margin-top:30px;">מפתח: דניאל כרייף | breslev6135@gmail.com</p>
    </div>

    <div id="cityPage" class="page">
        <div onclick="showPage('mainPage')" style="color:var(--green); cursor:pointer; font-weight:bold;">⬅️ חזרה</div>
        <h1 id="cityNameTitle" style="margin-top:20px;"></h1>
        
        <div class="guidelines-grid">
            <div class="guide-box"><b>🎓 לימודים</b><span>ללא מגבלה</span></div>
            <div class="guide-box"><b>💼 עבודה</b><span>כסדרה</span></div>
            <div class="guide-box"><b>👥 התקהלות</b><span>עד 1,000</span></div>
        </div>

        <h3>היסטוריית אמת ביישוב:</h3>
        <div id="cityHistoryFeed" class="history-feed"></div>
    </div>

<script>
    let myCities = JSON.parse(localStorage.getItem('ra_cities_final')) || [];
    let audioCtx = null;

    function playSound() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1.5);
    }

    async function fetchRealData() {
        try {
            // שימוש ב-Proxy עוקף חסימות אגרסיבי כדי להביא נתוני אמת
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.oref.org.il/WarningMessages/History/AlertsHistory.json') + '&t=' + Date.now());
            const json = await response.json();
            const data = JSON.parse(json.contents);
            
            if (data && data.length > 0) {
                // עדכון הפיד הארצי
                document.getElementById('globalFeed').innerHTML = data.slice(0, 15).map(a => `
                    <div class="feed-item"><span>${a.alertDate.split(' ')[1]}</span><b>${a.data}</b></div>
                `).join('');

                // בדיקה אם יש אזעקה חדשה בערים שלי
                myCities.forEach(city => {
                    const cityAlerts = data.filter(a => a.data.includes(city.name));
                    city.alertCount = cityAlerts.length;
                    city.history = cityAlerts;
                });
                renderCities();
            }
        } catch (e) {
            console.error("שגיאת חיבור ל-API");
            document.getElementById('globalFeed').innerHTML = "שגיאת סנכרון. וודא חיבור לאינטרנט.";
        }
    }

    function addCity() {
        const name = document.getElementById('cityInput').value.trim();
        if(name && !myCities.find(c => c.name === name)) {
            myCities.push({name, alertCount: 0, history: []});
            localStorage.setItem('ra_cities_final', JSON.stringify(myCities));
            renderCities();
            fetchRealData();
        }
        document.getElementById('cityInput').value = "";
    }

    function renderCities() {
        const list = document.getElementById('myCitiesList');
        list.innerHTML = myCities.map(c => `
            <div class="guide-box" style="width:100%; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; padding:15px; cursor:pointer;" onclick="openCity('${c.name}')">
                <span>${c.name}</span>
                <span style="color:var(--red)">${c.alertCount} התראות אמת</span>
            </div>
        `).join('');
    }

    function openCity(name) {
        const city = myCities.find(c => c.name === name);
        document.getElementById('cityNameTitle').innerText = name;
        document.getElementById('cityHistoryFeed').innerHTML = city.history.map(h => `
            <div class="feed-item"><span>${h.alertDate}</span><b>${h.title}</b></div>
        `).join('') || "אין התראות שתועדו ב-24 השעות האחרונות";
        showPage('cityPage');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    setInterval(fetchRealData, 5000); // רענון כל 5 שניות לנתוני אמת
    fetchRealData();
</script>
</body>
</html>
